<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom Simulator</title>

    <link rel="stylesheet" href="./assets/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="resources__container">
            <div class="resources">
                <div class="resource" id="energy">
                    <div class="icon">
                        <i class="bi bi-lightning-charge-fill"></i>
                    </div>
                    <div class="points">
                        <p>000</p>
                    </div>
                </div>
                <div class="resource" id="clients">
                    <div class="icon">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div class="points">
                        <p>000</p>
                    </div>
                </div>
                <div class="resource" id="patrimony">
                    <div class="icon">
                        <i class="bi bi-currency-exchange"></i>
                    </div>
                    <div class="points">
                        <p>000</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav class="menu">
        <div class="menu__item" id="menuEmpreendedor">
            <i class="bi bi-person-vcard-fill"></i>        
        </div>
        <div class="menu__item" id="menuTecnologia">
            <i class="bi bi-router-fill"></i>
        </div>
        <div class="menu__item" id="menuInfraestrutura">
            <i class="bi bi-broadcast-pin"></i>
        </div>
        <div class="menu__item" id="menuTrabalhar">
            <i class="bi bi-tools"></i>
        </div>
        <div class="menu__item" id="menuFinancas">
            <i class="bi bi-graph-up-arrow"></i>
        </div>
        <div class="menu__item" id="menuEmpresas">
            <i class="bi bi-buildings-fill"></i>
        </div>
    </nav>

    <section class="section__empreendedor">
        <div class="section__empreendedor__player">
            <div class="player__img">

            </div>
            <div class="player__info">
                <h1 id="playerName">CarrotGamerBr</h1>
                <h3 id="playerLevel">Iniciante</h3>
            </div>
        </div>
        <div class="section__empreendedor__interprise">
            <div class="interprise__name__box">
                <h2 id="interpriseName">CarrotInterprise</h2>
            </div>
            <div class="client__database">
                <div class="client__panel">
                    <div class="panel__item">
                        <div class="panel__item__text"></div>
                        <div class="panel__item__stats"></div>
                    </div>
                    <div class="panel__item">
                        <div class="panel__item__text"></div>
                        <div class="panel__item__stats"></div>
                    </div>
                    <div class="panel__item">
                        <div class="panel__item__text"></div>
                        <div class="panel__item__stats"></div>
                    </div>
                </div>
                <div class="client__plan"></div>
                <div class="client__technology"></div>
            </div>
        </div>
    </section>

</body>
</html>
